<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <title>Superhéroe Aleatorio</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilo personalizado opcional -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .hero-card {
            max-width: 450px;
            margin: 40px auto;
        }

        .hero-img {
            object-fit: cover;
            height: 350px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card hero-card shadow rounded-4 border-0">
            <img th:src="${hero.image.url}" alt="Imagen del superhéroe" class="card-img-top hero-img rounded-top-4">
            <div class="card-body text-center">
                <h2 class="card-title fw-bold mb-3" th:text="${hero.name}">Nombre del Superhéroe</h2>

                <!-- Puedes mostrar más info aquí si la tienes -->
                <!--
                <p class="card-text">Publisher: <span th:text="${hero.biography.publisher}">Marvel/DC</span></p>
                <p class="card-text">Primera aparición: <span th:text="${hero.biography.firstAppearance}">Comic</span></p>
                -->

                <a href="/superhero" class="btn btn-primary mt-3">Ver otro superhéroe</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (opcional para componentes interactivos) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
